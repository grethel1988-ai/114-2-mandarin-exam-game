<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>森林語文大冒險 - 國語期末評量遊戲</title>
  <!-- 引入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    
    <!-- 1. 開場畫面 -->
    <div id="start-screen" class="screen active">
      <div class="logo-area">
        <div class="forest-badge">
          <svg viewBox="0 0 100 100" width="80" height="80">
            <path d="M50,15 L80,75 L20,75 Z" fill="#2d6a4f"/>
            <path d="M50,30 L75,80 L25,80 Z" fill="#40916c"/>
            <rect x="46" y="75" width="8" height="15" fill="#1b4332"/>
            <circle cx="50" cy="50" r="40" stroke="#d8f3dc" stroke-width="4" fill="none"/>
          </svg>
        </div>
        <h1>森林語文大冒險</h1>
        <p class="subtitle">114-2 二年級國語期末挑戰</p>
      </div>

      <div class="card setup-card">
        <h2>建立你的勇士檔案</h2>
        <div class="input-group">
          <label for="player-name">勇士暱稱：</label>
          <input type="text" id="player-name" placeholder="輸入你的名字..." maxlength="10" value="小勇士">
        </div>

        <div class="avatar-selection">
          <p>選擇你的冒險夥伴：</p>
          <div class="avatar-grid">
            <div class="avatar-option active" data-avatar="squirrel">
              <div class="avatar-icon squirrel">🐿️</div>
              <span>松鼠奇奇</span>
            </div>
            <div class="avatar-option" data-avatar="bear">
              <div class="avatar-icon bear">🐻</div>
              <span>小熊托托</span>
            </div>
            <div class="avatar-option" data-avatar="rabbit">
              <div class="avatar-icon rabbit">🐰</div>
              <span>小白兔妮妮</span>
            </div>
            <div class="avatar-option" data-avatar="bird">
              <div class="avatar-icon bird">🐦</div>
              <span>小鳥皮皮</span>
            </div>
          </div>
        </div>

        <button id="btn-start" class="btn primary-btn">進入森林冒險 ➔</button>
      </div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="play-screen" class="screen">
      <!-- 頂部狀態列 -->
      <header class="status-bar">
        <div class="player-info">
          <div class="current-avatar" id="status-avatar">🐿️</div>
          <div>
            <div class="player-name-text" id="status-name">小勇士</div>
            <div class="stage-badge" id="current-stage-title">關卡 1：語文小旅行</div>
          </div>
        </div>

        <div class="game-stats">
          <div class="stat-item">
            <span class="stat-label">分數</span>
            <span class="stat-value font-outfit" id="score-val">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">生命</span>
            <div class="hearts-container" id="hearts-box">
              <span>❤️</span><span>❤️</span><span>❤️</span><span>❤️</span><span>❤️</span>
            </div>
          </div>
        </div>
      </header>

      <!-- 進度條 -->
      <div class="progress-container">
        <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        <div class="progress-text font-outfit" id="progress-txt">0 / 50</div>
      </div>

      <!-- 主要答題區 -->
      <main class="question-card" id="q-card">
        <!-- 閱讀測驗專用的雙欄結構 -->
        <div class="reading-layout" id="reading-box" style="display: none;">
          <div class="reading-passage" id="passage-content">
            <!-- 閱讀文章插入處 -->
          </div>
          <div class="reading-question-area" id="reading-q-area">
            <!-- 閱讀測驗題目與選項 -->
          </div>
        </div>

        <!-- 一般題目結構 -->
        <div class="normal-layout" id="normal-box">
          <div class="q-header">
            <span class="q-index" id="q-index-tag">第 1 題</span>
            <span class="q-type-badge" id="q-type-tag">國字注音</span>
          </div>
          
          <div class="q-text" id="question-text">
            題目內容載入中...
          </div>

          <!-- 一般選擇題選項區 -->
          <div class="options-grid" id="options-box">
            <!-- 動態插入選項 -->
          </div>

          <!-- 句子重組專用區 -->
          <div class="reorder-container" id="reorder-box" style="display: none;">
            <div class="reorder-slots" id="reorder-slots">
              <!-- 已放入的詞卡 -->
            </div>
            <div class="reorder-pool" id="reorder-pool">
              <!-- 待選擇的詞卡池 -->
            </div>
            <button id="btn-clear-reorder" class="btn secondary-btn">重設</button>
          </div>
        </div>
      </main>

      <!-- 回饋面板 -->
      <div class="feedback-panel" id="feedback-box" style="display: none;">
        <div class="feedback-icon" id="feedback-icon">🎉</div>
        <div class="feedback-content">
          <h3 id="feedback-title">回答正確！</h3>
          <p id="feedback-explain">太棒了，繼續保持！</p>
        </div>
        <button id="btn-next" class="btn primary-btn">下一題 ➔</button>
      </div>
    </div>

    <!-- 3. 結算/證書畫面 -->
    <div id="end-screen" class="screen">
      <div class="certificate-card">
        <div class="cert-border">
          <div class="cert-header">
            <div class="cert-logo">🎖️</div>
            <h2>森林語文小勇士證書</h2>
          </div>
          <div class="cert-body">
            <p>茲證明小勇士</p>
            <h3 id="cert-player-name">冒險者</h3>
            <p>在「森林語文大冒險」中展現無比勇氣與智慧，</p>
            <p>成功闖過所有關卡，並榮獲：</p>
            <div class="cert-rank" id="cert-rank-name">傳奇語文大師</div>
            <div class="cert-score-box">
              <div>最終得分：<span class="font-outfit" id="cert-score">0</span> 分</div>
              <div>答對題數：<span class="font-outfit" id="cert-correct-count">0</span> / 50 題</div>
            </div>
          </div>
          <div class="cert-footer">
            <p>陽光森林守護精靈 頒發</p>
            <p class="font-outfit date-txt" id="cert-date">2026-06-13</p>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button id="btn-restart" class="btn primary-btn">重啟大冒險 🔄</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
